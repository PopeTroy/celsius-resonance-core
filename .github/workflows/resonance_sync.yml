name: Celsius Resonance Sync

on:
  repository_dispatch:
    types: [activate_audit]
  workflow_dispatch:
    inputs:
      node:
        description: 'Subject Injection'
        required: true
        default: 'Global Infrastructure'

jobs:
  prophetic_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # This was the blocked line

      - name: Setup Python
        uses: actions/setup-python@v4 # This was the blocked line
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install groq

      - name: Execute PRCE Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TARGET_NODE: ${{ github.event.inputs.node || github.event.client_payload.node }}
          SESSION_ID: ${{ github.event.client_payload.session_id || 'manual_run' }}
        run: python scripts/apex_engine.py

      - name: Buffer (60s)
        run: sleep 60

      - name: Return Resonance
        run: |
          curl -X POST "${{ secrets.WP_URL }}/wp-json/uesp/v1/update" \
          -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
          -H "Content-Type: application/json" \
          -d @data/resonance_output.json
