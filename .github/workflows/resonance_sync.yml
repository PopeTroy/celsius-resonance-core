name: Celsius Deep History Sync
on:
  repository_dispatch:
    types: [activate_audit]

jobs:
  diagnostic_run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install groq

      - name: Run 586AD-2026 Deep Audit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TARGET_NODE: ${{ github.event.client_payload.node }}
        run: python scripts/apex_engine.py

      - name: Diagnostic Buffer (The 60s Trip)
        run: sleep 60

      - name: Push to Celsius Media Command Center
        run: |
          curl -X POST "https://celsiusmediagroup.co.za/wp-json/uesp/v1/update" \
          -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
          -H "Content-Type: application/json" \
          -d @data/resonance_output.json
