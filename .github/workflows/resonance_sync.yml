name: Celsius Resonance Sync
on:
  repository_dispatch:
    types: [activate_audit]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: {python-version: '3.10'}
      - run: pip install groq
      - env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TARGET_NODE: ${{ github.event.client_payload.node }}
          SESSION_ID: ${{ github.event.client_payload.session_id }}
        run: python scripts/apex_engine.py
      - run: sleep 60
      - run: |
          curl -X POST "${{ secrets.WP_URL }}/wp-json/uesp/v1/update" \
          -u "${{ secrets.WP_USER }}:${{ secrets.WP_APP_PASSWORD }}" \
          -H "Content-Type: application/json" \
          -d @data/resonance_output.json
