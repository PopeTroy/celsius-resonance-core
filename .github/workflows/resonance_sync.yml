name: Celsius Resonance Sync

on:
  repository_dispatch:
    types: [activate_audit]

jobs:
  prophetic_audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install groq

      - name: Execute PRCE Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TARGET_NODE: ${{ github.event.client_payload.node }}
          SESSION_ID: ${{ github.event.client_payload.session_id }}
        run: python scripts/apex_engine.py

      - name: Commit & Push Session Data
        run: |
          git config --global user.name "UESP-Bot"
          git config --global user.email "bot@celsiusmediagroup.co.za"
          git add data/*.json
          git commit -m "Audit Data: ${{ github.event.client_payload.session_id }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Return Resonance to WordPress
        run: |
          # --http1.1 prevents the Exit Code 92 stream error
          # --retry helps with intermittent connection drops
          curl --http1.1 --retry 3 -X POST "https://your-wordpress-site.com/wp-json/uesp/v1/update" \
          -H "Content-Type: application/json" \
          -d @data/resonance_output.json
